name: Tự động Deploy lên Docker Hub

on:
  push:
    branches: [ "main" ] # Chỉ chạy khi có code đẩy lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Bước 1 - Checkout code từ Github
        uses: actions/checkout@v6.0.2

      - name: Bước 2 - Đăng nhập vào kho Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          # Sửa lại đúng tên Secret bạn đã tạo trong ảnh
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Bước 3 - Build và Push Image
        uses: docker/build-push-action@v7.0.0
        with:
          context: . # Chạy Dockerfile ở thư mục gốc
          push: true
          # Đổi sang tên tài khoản của Vũ
          tags: |
            buithanhanhvu/cv-app:latest
            buithanhanhvu/cv-app:v1
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="buithanhanhvu/cv-app"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=6&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
