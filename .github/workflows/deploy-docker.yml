name: Tự động Deploy lên Docker Hub

on:
  push:
    branches: [ "main" ] # Tự động chạy khi bạn push code lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Bước 1 - Checkout code từ Github
        uses: actions/checkout@v6.0.2

      - name: Bước 2 - Đăng nhập vào kho Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Bước 3 - Build và Push Image
        uses: docker/build-push-action@v7.0.0
        with:
          context: . 
          push: true
          tags: |
            buithanhanhvu/cv-app:latest
            buithanhanhvu/cv-app:v1

      - name: Bước 4 - Triển khai lên DevOps Classroom
        run: |
          # Khai báo thông tin Repo và Port của App (thường là 80 hoặc 8080)
          REPO="buithanhanhvu/cv-app"
          CONTAINER_PORT=80
          
          # Gọi Webhook của thầy để yêu cầu Server tải Image mới về chạy
          # Lưu ý: slot=6 tương ứng với Port 21041 trên server của thầy
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=6&container_port=$CONTAINER_PORT")
          
          # Tách nội dung phản hồi (Body) và Mã trạng thái (HTTP Code)
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          
          echo "Webhook HTTP Status: $CODE"
          
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo " Deploy thất bại! Kiểm tra lại DEPLOY_URL hoặc Slot."
            echo "::group::Chi tiết lỗi từ Server"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          
          echo " Deploy thành công rực rỡ!"
          echo "::group::Kết quả trả về từ Webhook"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
